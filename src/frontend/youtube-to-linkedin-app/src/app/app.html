<h1>YouTube to LinkedIn</h1>

@if (view === 'form') {
  <fieldset>
    <form (ngSubmit)="onSubmit()">
      <div>
        <label for="url">YouTube URL</label>
        <input id="url" name="url" [(ngModel)]="url" required />
      </div>
      <div>
        <label for="postType">Post Type</label>
        <input id="postType" name="postType" [(ngModel)]="postType" required />
      </div>
      <div>
        <label for="mode">Mode</label>
        <input id="mode" name="mode" [(ngModel)]="mode" required />
      </div>
      <button type="submit">Start</button>
    </form>
  </fieldset>
} @else {
  <app-workflow-progress
    [sessionId]="currentSessionId"
    (retry)="onRetry()"
  />
  <button type="button" (click)="onCancel()">Cancelar</button>
  @if (lastError()) {
    <div class="error-message">
      <p>{{ lastError()!.message }}</p>
      @if (lastError()!.errorCode === 'no_transcript') {
        <button type="button" (click)="onRetry()">Tentar com outro vídeo</button>
      } @else {
        <button type="button" (click)="onRetry()">Tentar Novamente</button>
      }
    </div>
  }
  @if (consultedQuestions()) {
    <app-consulted-questions
      [questions]="consultedQuestions()!"
      [sessionId]="currentSessionId"
      (submitted)="onConsultedSubmitted()"
    />
  }
  @if (postDraft) {
    <app-post-draft
      [draft]="postDraft.draft"
      [templateUsed]="postDraft.templateUsed"
      (reset)="onReset()"
    />
  }
}
